# Определяем зоны ограничения запросов
# 1 r/s для бронирования (burst=2 — кратковременный всплеск)
# 5 r/m для админ-логина (защита от брутфорса)
limit_req_zone $binary_remote_addr zone=booking:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Бронирование — строгий лимит
    location /api/booking {
        limit_req zone=booking burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Админ-логин — защита от перебора
    location /api/admin/login {
        limit_req zone=admin_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальные API-запросы — без ограничений
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}